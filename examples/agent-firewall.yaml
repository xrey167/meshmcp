# The agent firewall: policy-as-code for what an agent may do, enforced at the
# network layer where no jailbreak can talk past it. This config shows every
# capability constraint the policy engine supports.
#
#   - rate limits        cap how often an identity may call a tool
#   - time windows       a tool is callable only on certain days/hours
#   - taint tracking     untrusted data blocks downstream privileged calls
#   - co-sign            a privileged call waits for a human's approval
#
# The audit log is a tamper-evident hash chain: verify it with
#   meshmcp audit verify ./agent-firewall-audit.jsonl
# and watch it live with
#   meshmcp dash --audit ./agent-firewall-audit.jsonl
mesh:
  device_name: meshmcp-firewall
  setup_key_env: NB_SETUP_KEY
  config_path: ./firewall-gw.json
  log_level: info

backends:
  - name: agent-tools
    port: 9110
    stdio: ["./cmd/mcpserver/mcpserver.exe"]
    resumable: true
    audit_log: ./agent-firewall-audit.jsonl
    # Make the audit log non-repudiable: sign periodic Merkle checkpoints with a
    # gateway key (generated on first run if missing). Verify later with
    #   meshmcp audit verify ./agent-firewall-audit.jsonl \
    #     --checkpoints ./agent-firewall-cps.jsonl --pubkey <public-key>
    audit_checkpoints: ./agent-firewall-cps.jsonl
    audit_signing_key: ./audit-signing-key.json
    audit_checkpoint_every: 64
    # External anchoring (optional): witness every checkpoint outside the
    # gateway, so even a key-holding insider who rolls the log and checkpoints
    # back together is caught by
    #   meshmcp audit verify <log> --checkpoints <f> --pubkey <hex> --anchors <witness-file>
    # audit_anchor: ./agent-firewall-anchor.jsonl        # local append-only, self-linked anchor file
    # audit_anchor_url: http://control:9600/v1/anchor    # peer witness (meshmcp control --anchor-witness)
    # Shared directory where human co-sign approvals land (see `meshmcp approve`).
    cosign_store: ./cosign
    cosign_ttl_seconds: 3600
    policy:
      default_allow: false
      rules:
        # Read-only tools: always allowed, but rate-limited per identity.
        - peers: ["*"]
          tools: ["read_*", "search_*", "add"]
          allow: true
          rate: { max: 30, per: "1m" }

        # `fetch` pulls arbitrary external content — mark it a taint source.
        # After it runs, the session is considered untrusted.
        - peers: ["*"]
          tools: ["fetch", "http_*"]
          allow: true
          taint_source: true

        # `write_file` is privileged: blocked whenever the session is tainted,
        # so poisoned content can never drive a write. Prompt-injection defense
        # at the network layer.
        - peers: ["*"]
          tools: ["write_file", "run_command"]
          allow: true
          taint_guard: true

        # Deploys only on weekday business hours (UTC).
        - peers: ["*"]
          tools: ["deploy"]
          allow: true
          when: { days: ["mon", "tue", "wed", "thu", "fri"], hours: "09:00-17:00", tz: "UTC" }

        # Data-flow labels: reading customer records tags the session "pii"...
        - peers: ["*"]
          tools: ["read_customer"]
          allow: true
          emit_labels: ["pii"]

        # ...and any external-egress tool refuses to run once "pii" is present,
        # so customer data can never leave the mesh through an agent — a control
        # no LLM guardrail or ordinary firewall can express.
        - peers: ["*"]
          tools: ["post_external", "email_*"]
          allow: true
          block_labels: ["pii"]

        # Money movement always requires a human co-sign on the mesh:
        #   meshmcp approve --store ./cosign <peer-fqdn> transfer_funds
        - peers: ["*"]
          tools: ["transfer_funds"]
          allow: true
          require_cosign: true
