# Continuity — agent/session handoff (F5).
#
# A resumable backend with a SHARED, durable session store hands its live
# session off between gateways: if the gateway that owns a session dies (or you
# move the workload), another gateway sharing the store rehydrates the same
# session — the agent's in-flight work survives, exactly-once, without the
# client noticing. This is the session migration proven in session/ (lease +
# shared store; migration_test.go, lease_test.go), applied to an agent backend.
#
# Run two gateways with the SAME session_store directory (e.g. on shared
# storage); the second takes over automatically on failover:
#   meshmcp serve --config examples/continuity.yaml            # gateway A
#   meshmcp serve --config examples/continuity.yaml            # gateway B (elsewhere)
#
# The client connects resumably and roams across the handoff transparently:
#   meshmcp connect --resumable <gw-ip>:9150

mesh:
  device_name: meshmcp-continuity
  setup_key_env: NB_SETUP_KEY
  config_path: ./continuity-nb.json
  log_level: warn

backends:
  # A long-running agent/memory backend whose session must survive a gateway
  # handoff. The backend restores its own per-session state from
  # MESHMCP_SESSION_ID, so the mode is "backend".
  - name: memory
    port: 9150
    stdio: ["./cmd/memory/memory.exe", "--store", "./memory.jsonl"]
    resumable: true
    session_ttl_seconds: 300           # keep a detached session alive this long
    session_store: ./sessions/memory   # SHARE this dir between gateways (durable)
    session_store_mode: backend        # backend restores state from MESHMCP_SESSION_ID
