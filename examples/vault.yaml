# Mesh secrets vault (F26): a zero-exposure secrets manager on the mesh, plus a
# backend that USES its secrets — the two halves of "manage and inject without
# the agent ever holding the value."
#
#   - The `vault` backend manages the store: set_secret / rotate_secret /
#     delete_secret / list_secrets. It has NO get tool — values never return to
#     the caller. The firewall governs who may manage it.
#   - The `payments` backend references those secrets by name ({{secret:...}});
#     the gateway's broker injects the value on an authorized call, refuses it
#     into a tainted session, and audits the use by name (never value).
mesh:
  device_name: meshmcp-vault
  setup_key_env: NB_SETUP_KEY
  config_path: ./vault-gw.json

backends:
  - name: vault
    port: 9150
    stdio: ["./cmd/vault/vault", "--store", "./vault.json"]
    audit_log: ./vault-audit.jsonl
    policy:
      default_allow: false
      rules:
        # Only an operator identity may manage secrets.
        - peers: ["pubkey:<operator-key>"]
          tools: ["set_secret", "rotate_secret", "delete_secret", "list_secrets"]
          allow: true

  - name: payments
    port: 9151
    stdio: ["./cmd/mcpserver/mcpserver.exe"]
    audit_log: ./vault-audit.jsonl
    policy:
      default_allow: false
      rules:
        - peers: ["*"]
          tools: ["charge"]
          allow: true
    secrets:
      file: ./vault.json                 # the same store the vault manages
      grants:
        - peers: ["pubkey:<billing-agent-key>"]
          secrets: ["stripe_key"]
          tools: ["charge"]
          block_labels: ["tainted"]      # never inject into a tainted session
