# Credential broker: agents call tools that need API keys, but the agent never
# holds the key. It references a secret by name — {{secret:stripe_key}} — inside
# the tool arguments, and the gateway injects the real value by cryptographic
# identity on the way to the backend. Every use is audited (the name, never the
# value), and injection is refused into a tainted session so untrusted content
# can't trigger a credential use.
#
# Store the values out of band (mode 0600 file, or environment) — never here.
#   echo '{"stripe_key":"sk_live_...","openai":"sk-..."}' > ./secrets.json && chmod 600 ./secrets.json
# Validate without revealing anything:
#   meshmcp secrets check --config examples/secrets.yaml
mesh:
  device_name: meshmcp-secrets
  setup_key_env: NB_SETUP_KEY
  config_path: ./secrets-gw.json
  log_level: info

backends:
  - name: payments
    port: 9120
    stdio: ["./cmd/mcpserver/mcpserver.exe"]
    resumable: true
    audit_log: ./secrets-audit.jsonl
    # Secrets require a policy — injection happens at the enforcement point.
    policy:
      default_allow: false
      rules:
        - peers: ["*"]
          tools: ["charge", "refund", "ask_openai"]
          allow: true
        # fetch taints the session; a tainted session gets no credentials (below).
        - peers: ["*"]
          tools: ["fetch"]
          allow: true
          taint_source: true
    secrets:
      file: ./secrets.json          # {"stripe_key":"...","openai":"..."}
      env_prefix: MESHMCP_SECRET_    # fallback: $MESHMCP_SECRET_<name>
      grants:
        # The billing agent may inject the Stripe key — but only into charge/refund,
        # and never once the session is tainted by untrusted data.
        - peers: ["pubkey:BILLING_AGENT_WIREGUARD_KEY"]
          secrets: ["stripe_key"]
          tools: ["charge", "refund"]
          block_labels: ["tainted"]
        # Any mesh peer may use the OpenAI key for the ask_openai tool.
        - peers: ["*"]
          secrets: ["openai"]
          tools: ["ask_openai"]
