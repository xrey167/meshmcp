version: 2
updates:
  # Go module dependencies.
  - package-ecosystem: gomod
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      go-dependencies:
        patterns: ["*"]

  # GitHub Actions (kept pinned by SHA; Dependabot bumps the SHA + version).
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
