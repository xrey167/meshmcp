name: CI

on:
  push:
    branches: ["main"]
  pull_request:

# Least privilege: CI only needs to read the repository.
permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Build, vet, and test (including the race detector) on all three platforms,
  # so stdio/HTTP behavior and concurrency are exercised cross-OS.
  test:
    name: build & test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      # actions/checkout v4.2.2, pinned by commit SHA.
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
      # actions/setup-go v5.2.0, pinned by commit SHA.
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e
        with:
          go-version-file: go.mod
          cache: true
      - name: go build
        run: go build ./...
      - name: go vet
        run: go vet ./...
      # No quarantined tests. The formerly-flaky steer tests
      # (TestSteerDeliveryRequiresApplicationAck, TestTaskSteer) were fixed at
      # the root, twice over: session/endpoint.go's sendClose commits the close
      # atomically with the CLOSE write (the redial can no longer fire —
      # regression: TestGracefulDrainCloseNeverReattaches), and
      # session/client.go's reconnectLoop additionally tolerates a redial that
      # finds a cleanly finalized session — verified green under -race -count=25.
      - name: go test
        run: go test ./...
      - name: go test -race
        run: go test -race ./...

  # Formatting, static analysis, vulnerability scanning, module verification,
  # and a fuzz smoke test — Linux only (bash), keeps the matrix fast.
  checks:
    name: lint, vuln & fuzz
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e
        with:
          go-version-file: go.mod
          cache: true

      - name: gofmt
        run: |
          unformatted="$(gofmt -l . | grep -v '/vendor/' || true)"
          if [ -n "$unformatted" ]; then
            echo "These files are not gofmt-clean:"; echo "$unformatted"; exit 1
          fi

      - name: go vet
        run: go vet ./...

      - name: go mod verify
        run: go mod verify

      # Fork-pin audit (S33): surface every `replace` directive so a reviewer
      # sees exactly which forks the build pulls and at what pin. Advisory, not
      # a gate — Go resolves every replace version to an immutable form (a semver
      # tag or a commit pseudo-version; a floating branch cannot appear here), so
      # there is nothing mechanical left to fail on. The value is visibility: a
      # changed pin shows up in this step's output and in the diff for review.
      - name: fork-pin audit (advisory)
        run: |
          go mod edit -json | python3 -c 'import json,sys
          rs=json.load(sys.stdin).get("Replace") or []
          print("fork replace directives ("+str(len(rs))+"):")
          [print("  ", r["New"]["Path"], r["New"].get("Version","(local path)")) for r in rs]'

      # staticcheck and govulncheck are ADVISORY, and cannot be promoted yet for
      # a hard reason (verified 2026-07): the released staticcheck (v0.7.0) pins
      # go1.25 and refuses every package in this repo with "requires newer Go
      # version go1.26" — a required job would fail on the toolchain mismatch,
      # not on findings. Promote staticcheck the moment honnef.co/go/tools
      # supports go1.26; govulncheck stays advisory until its DB is reachable
      # from the runner.
      - name: staticcheck (advisory)
        continue-on-error: true
        run: go run honnef.co/go/tools/cmd/staticcheck@latest ./...

      - name: govulncheck (advisory)
        continue-on-error: true
        run: go run golang.org/x/vuln/cmd/govulncheck@latest ./...

      - name: fuzz smoke (policy classification boundary)
        run: go test ./policy/ -run '^$' -fuzz FuzzFilterClassification -fuzztime 30s

  # PostgreSQL-backed conformance: exercises the distributed CAS lease store,
  # cross-gateway migration + live session move, the idempotency claim store,
  # and the DPoP/replay stores against a real Postgres (S22). These suites
  # t.Skip when MESHMCP_TEST_PG_DSN is unset (as in the matrix job above), so
  # this job is where they actually run.
  postgres:
    name: postgres CAS conformance
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_PASSWORD: meshmcp
          POSTGRES_DB: meshmcp
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s --health-timeout 5s --health-retries 10
    env:
      MESHMCP_TEST_PG_DSN: "postgres://postgres:meshmcp@127.0.0.1:5432/meshmcp?sslmode=disable"
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e
        with:
          go-version-file: go.mod
          cache: true
      - name: pgstore + session + mcp conformance against live Postgres
        run: go test ./pgstore/... ./session/... ./mcp/... -count=1
